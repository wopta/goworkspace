steps:

- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - '-c'
  - |
    version=( $(grep -Eo '[[:digit:]]+|[^[:digit:]]+' <<<"$BRANCH_NAME") )
    echo ${version}
    gcloud \
    functions \
    deploy \
    enrich-vat \
    --region=europe-west1 \
    --source=./EnrichVatCode \
    --trigger-http \
    --runtime=go116 \
    --entry-point=EnrichVatCode \
    --set-env-vars munichreBaseUrl=$_MUNICHREBASEURL,munichreTokenEndPoint=$_MUNICHRETOKENENDPOINT,munichreScope=$_MUNICHRESCOPE,munichreClientId=$_MUNICHRECLIENTID,munichreClientSecret=$_MUNICHRECLIENTSECRET,munichreSubscriptionKey=$_MUNICHRESUBSCRIPTIONKEY \  
    --service-account=146852404745@cloudbuild.gserviceaccount.com \
    --project=positive-apex-350507 \
  entrypoint: bash