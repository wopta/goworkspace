steps:

- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - '-c'
  - |
    export namefx=( $(grep -Eo '[[:digit:]]+|[^[:digit:]]+' <<<'$TAG_NAME') )
    #Read the string value
    echo $namefx
    read text
    # Set comma as delimiter
    IFS='/'
    #Read the split words into an array based on comma delimiter
    read -a strarr <<< $TAG_NAME
    #Print the splitted words
    echo "namefx : ${strarr[0]}"

    name_upper=$(sed -r 's/(^|-)(\w)/\U\2/g' <<<"${strarr[0]}")
    echo "namefx camel : ${name_upper}"
    # Save a value to persistent volume mount: "/workspace"
    echo $namefx > /workspace/namefx.txt &&
    # Save another
    expr 1 + 1 > /workspace/second.txt
    echo $_VERSION
  entrypoint: bash

- name: gcr.io/cloud-builders/gcloud:latest
  entrypoint: "ls"
  args: ["-lah","/workspace"]

- name: gcr.io/cloud-builders/gcloud:latest
  entrypoint: bash
  args: ['$(cat /workspace/first.txt)']

- name: gcr.io/cloud-builders/gcloud:latest
  args:
  - functions
  - deploy
  - enrich-vat
  - --region=europe-west1
  - --source=/workspace/enrich-vat
  - --entry-point=EnrichVat 
  - --trigger-http
  - --runtime=go116
  - --set-env-vars
  - munichreBaseUrl=$_MUNICHREBASEURL,munichreTokenEndPoint=$_MUNICHRETOKENENDPOINT,munichreScope=$_MUNICHRESCOPE,munichreClientId=$_MUNICHRECLIENTID,munichreClientSecret=$_MUNICHRECLIENTSECRET,munichreSubscriptionKey=$_MUNICHRESUBSCRIPTIONKEY  
  - --service-account=146852404745@cloudbuild.gserviceaccount.com 
  - --project=positive-apex-350507