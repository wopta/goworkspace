steps:
- name: 'gcr.io/cloud-builders/gsutil'
  args: ['cp', 'gs://cloud-build-data/env/dev.yaml', '.']
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - '-c'
  - |
    export namefx=( $(grep -Eo '[[:digit:]]+|[^[:digit:]]+' <<<'$TAG_NAME') )
    #Read the string value
    echo $namefx
    read text
    # Set comma as delimiter
    IFS='/'
    #Read the split words into an array based on comma delimiter
    read -a strarr <<< $TAG_NAME
    #Print the splitted words
    echo "namefx : ${strarr[0]}"

    name_camel=$(sed -r 's/(^|-)(\w)/\U\2/g' <<<"${strarr[0]}")
    echo "namefx camel : ${name_camel}"

    # Save a value to persistent volume mount: "/workspace"
    echo $namefx > /workspace/namefx.txt &&
    # Save another
    echo $name_camel > /workspace/entrypoint.txt
    ls -la
    gcloud functions deploy $namefx \
    --region=europe-west1 \
    --source=/workspace/enrich-vat \
    --entry-point=EnrichVat \
    --trigger-http \
    --runtime=go116 \
    --env-vars-file dev.yaml \
    --service-account=146852404745@cloudbuild.gserviceaccount.com \
    --project=positive-apex-350507
  entrypoint: bash

- name: gcr.io/cloud-builders/gcloud:latest
  entrypoint: "ls"
  args: ["-lah","/workspace"]

- name: gcr.io/cloud-builders/gcloud:latest
  args:
  - functions
  - deploy
  - '$(cat /workspace/namefx.txt)'
  - --region=europe-west1
  - --source=/workspace/enrich-vat
  - --entry-point=EnrichVat 
  - --trigger-http
  - --runtime=go116
  - --env-vars-file /workspace/env/dev.yaml
  - --service-account=146852404745@cloudbuild.gserviceaccount.com 
  - --project=positive-apex-350507
  