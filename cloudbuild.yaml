steps:

- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - '-c'
  - |
    export version=( $(grep -Eo '[[:digit:]]+|[^[:digit:]]+' <<<'$BRANCH_NAME') )
    echo ${version}
    ls
  entrypoint: bash

- name: gcr.io/cloud-builders/gcloud:latest
  entrypoint: "ls"
  args: ["-lah","/workspace"]

- name: gcr.io/cloud-builders/gcloud:latest
  entrypoint: "echo"
  args: ["$${version} "]

- name: gcr.io/cloud-builders/gcloud:latest
  args:
  - functions
  - deploy
  - enrich-vat
  - --region=europe-west1
  - --source=/workspace/enrichVatCode
  - --entry-point=$${version} 
  - --trigger-http
  - --runtime=go116
  - --set-env-vars
  - munichreBaseUrl='$_MUNICHREBASEURL',munichreTokenEndPoint='$_MUNICHRETOKENENDPOINT',munichreScope='$_MUNICHRESCOPE',munichreClientId='$_MUNICHRECLIENTID',munichreClientSecret='$_MUNICHRECLIENTSECRET',munichreSubscriptionKey='$_MUNICHRESUBSCRIPTIONKEY'    
  - --service-account=146852404745@cloudbuild.gserviceaccount.com 
  - --project=positive-apex-350507